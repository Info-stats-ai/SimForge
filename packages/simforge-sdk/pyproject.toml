[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "simforge"
version = "0.1.0"
description = "SimForge SDK — Define, compile, and evaluate warehouse edge-case simulation scenarios"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "SimForge Team"}
]

dependencies = [
    "pydantic>=2.5.0",
    "httpx>=0.25.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["simforge*"]

[tool.ruff]
target-version = "py311"
line-length = 100
